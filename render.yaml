services:
  - type: web
    name: kiddolearn-api
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack pnpm install --frozen-lockfile && corepack pnpm run build
    startCommand: corepack pnpm run start:prod
    healthCheckPath: /api/health/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 24h
      - key: GEMINI_API_KEY
        sync: false
